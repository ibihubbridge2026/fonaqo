name: fonaco
description: "FONACO est une plateforme de mise en relation intelligente entre des personnes qui ont besoin d’un service et des personnes disponibles pour exécuter ces services (Agent)."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  font_awesome_flutter: ^10.7.0
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/icon/fonaco.png
    - assets/images/slide/
    - assets/images/hero/
#CONFIG ICON APP (IMPORTANT: ICI ET PAS DANS DEPENDENCIES)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/fonaco.png"