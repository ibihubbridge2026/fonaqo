name: fonaco

description: >
  FONACO est une plateforme de mise en relation intelligente
  entre des personnes qui ont besoin d’un service et des personnes
  disponibles pour exécuter ces services (Agent).

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # =========================
  # UI & DESIGN
  # =========================
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  flutter_native_splash: ^2.4.7
  shimmer: ^3.0.0
  google_fonts: ^6.2.1  # Pour la police Poppins
  flutter_svg: ^2.0.10
  # =========================
  # AUDIO & VOIX
  # =========================
  record: ^6.2.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  
  # =========================
  # NOTATION & AVIS
  # =========================
  flutter_rating_bar: ^4.0.1
  
  # =========================
  # MÉDIAS & FICHIERS
  # =========================
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  
  # =========================
  # EXPORT PDF
  # =========================
  pdf: ^3.11.1
  printing: ^5.12.0
  
  # =========================
  # CONNECTIVITY & OFFLINE
  # =========================
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.3.2

  # =========================
  # CARTOGRAPHIE & GPS
  # =========================
  flutter_map: ^7.0.2

  # IMPORTANT :
  # version stable compatible Kotlin récent
  google_maps_flutter: ^2.12.3

  latlong2: ^0.9.1
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  permission_handler: ^11.4.0
  app_settings: ^5.2.0

  # =========================
  # API & DONNÉES
  # =========================
  dio: ^5.8.0+1
  provider: ^6.1.5
  flutter_secure_storage: ^9.2.4
  logger: ^2.6.0
  web_socket_channel: ^3.0.3

  # =========================
  # FIREBASE
  # =========================
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.6
  google_sign_in: ^6.2.1

  # IMPORTANT :
  # version stable Android 15
  flutter_local_notifications: ^17.2.4

  # =========================
  # OUTILS
  # =========================
  local_auth: ^2.3.0
  
  # =========================
  # CACHE OFFLINE & PERFORMANCE
  # =========================
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_image_compress: ^2.3.0
  
  # =========================
  # MONITORING & CRASH REPORTING
  # =========================
  # sentry_flutter: désactivé (incompatibilité Kotlin 1.6) - utiliser stub local
  
  # =========================
  # ANIMATIONS & TUTORIEL
  # =========================
  lottie: ^3.1.0
  tutorial_coach_mark: ^1.2.12
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/slide/
    - assets/images/hero/
    - assets/images/avatar/
    - assets/images/events/
    - assets/animations/
    - favicon.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/fonaco-icon.png"
  adaptive_icon_background: "#FFD400"
  adaptive_icon_foreground: "assets/icon/fonaco-icon.png"